[loggers]
keys=root,factorio_hub

[handlers]
keys=console,file

[formatters]
keys=standard,simple

[logger_root]
level=WARNING
handlers=console

[logger_factorio_hub]
level=DEBUG
handlers=console,file
qualname=factorio_hub
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=simple
args=(sys.stdout,)

[handler_file]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=standard
# Fichier dans data/logs/, 5 Mo max, 3 rotations
args=('data/logs/factorio_hub.log', 'a', 5242880, 3, 'utf-8')

[formatter_standard]
format=%(asctime)s [%(levelname)-8s] %(name)s: %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_simple]
format=[%(levelname)s] %(message)s